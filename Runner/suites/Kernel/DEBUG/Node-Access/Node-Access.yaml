metadata:
  name: Sysfs-Node-Access
  description: "Iterates through all Coresight sysfs nodes (excluding TPDM) and attempts to read them to ensure stability and permission correctness."

  os:
    - linux
  devices:
    - qcm6490
    - qcs9100
  scope:
    - coresight
    - kernel
  timeout: 120

run:
  steps:
    - REPO_PATH=$PWD
    - cd Runner/suites/Kernel/DEBUG/Node-Access
    - ./run.sh || true
    - $REPO_PATH/Runner/utils/send-to-lava.sh Node-Access.res || true