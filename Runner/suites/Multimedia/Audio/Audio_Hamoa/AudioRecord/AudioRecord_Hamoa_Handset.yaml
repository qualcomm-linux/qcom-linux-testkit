metadata:
  name: audio-record-hamoa-handset
  format: "Lava-Test Test Definition 1.0"
  description: "Audio Hamoa handset recording validation (built-in microphone)"
  os:
    - linux
  scope:
    - functional

params:
  DEVICE: "handset"  # Device to test: handset, headset, or all, default: handset
  CONFIG_NAME: "record_config1"  # Record configuration name (e.g., record_config1), default: record_config1
  DURATION: 5  # Recording duration in seconds, default: 5
  SKIP_ACTUAL_RECORDING: 0  # Skip actual audio recording, only test mixer configuration (0=record audio, 1=skip), default: 0
  VERBOSE: 0  # Enable verbose logging, default: 0
  RES_SUFFIX: "Handset"  # Suffix for unique result file, default: Handset
  LAVA_TESTCASE_ID: "AudioRecord_Hamoa_Handset"  # Unique testcase ID for LAVA, default: AudioRecord_Hamoa_Handset

run:
  steps:
    - REPO_PATH=$PWD
    - cd Runner/suites/Multimedia/Audio/Audio_Hamoa/AudioRecord/
    - ./run.sh --device "${DEVICE}" --config-name "${CONFIG_NAME}" --duration "${DURATION}" --skip-actual-recording "${SKIP_ACTUAL_RECORDING}" --verbose "${VERBOSE}" --res-suffix "${RES_SUFFIX}" --lava-testcase-id "${LAVA_TESTCASE_ID}" || true
    - $REPO_PATH/Runner/utils/send-to-lava.sh AudioRecord_Hamoa${RES_SUFFIX:+_${RES_SUFFIX}}.res
